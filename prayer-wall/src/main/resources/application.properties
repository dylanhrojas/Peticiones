spring.application.name=prayer-wall

# Database - Railway will override with DATABASE_URL env var (converted by railway-config.sh)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/prayerwall}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server port - Railway will override with PORT env var
server.port=${PORT:8080}

# JWT Secret - Railway will provide via env var
jwt.secret=${JWT_SECRET:prayer-wall-secret-key-that-is-at-least-32-bytes}

# OAuth2 - Google (fill in after creating Google Cloud credentials)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:REPLACE_ME}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:REPLACE_ME}
